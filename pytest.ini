[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    --tb=short
    --strict-markers
markers =
    schema: Output schema validation tests
    hallucination: Hallucination detection tests
    toxicity: Toxicity and safety tests
    contract: Pact contract tests
    slow: Tests that take longer to run
